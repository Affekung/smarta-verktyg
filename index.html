<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI-kalkylator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>⚖️ BMI-kalkylator</h1>

    <label>Längd (cm)</label>
    <input type="number" id="height" placeholder="Exempel: 180">

    <label>Vikt (kg)</label>
    <input type="number" id="weight" placeholder="Exempel: 75">

    <button class="primary" onclick="calculateBMI()">Beräkna BMI</button>

    <div id="result"></div>

    <a class="back-link" href="kalorier.html">🔥 Gå till Kalorikalkylatorn</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
